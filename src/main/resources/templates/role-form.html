<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Role Management</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" type="text/css">
    <script th:src="@{/webjars/bootstrap/js/bootstrap.min.js}" type="text/javascript"></script>
</head>
<body>
<div class="container mt-5 border border-1">
    <div class="container">
        <div class="fs-1">
            <h1 class="fw-bolder">Manage Role</h1>
        </div>
        <form th:action="@{/roles/saveRole}" method="post" class="row g-3" th:object="${role}">
            <input type="hidden" th:field="*{roleId}">
            <div class="col-12 mt-5">
                <label class="form-label fw-bold">Role</label>
                <input type="text" th:field="*{roleType}" class="form-control">
                <div class="text-danger" th:if="${#fields.hasErrors('roleType')}" th:errors="*{roleType}"></div>
            </div>
            <div class="col-12 d-grid gap-2">
                <button type="submit" class="btn btn-success">Submit</button>
            </div>
        </form>
    </div>
    <div class="container mt-5">
        <table class="table table-bordered table-striped">
            <thead>
                <tr>
                    <th class="col-6 fw-bold">Role</th>
                    <th class="col-6 fw-bold">Action</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="role : ${roleList}">
                    <td th:text="${role.roleType}"></td>
                    <td>
                        <a th:href="@{/roles/manageRole/{roleId}(roleId=${role.roleId})}" class="link-success">Edit</a>
                        &nbsp;|&nbsp;
                        <a th:href="@{/roles/deleteRole/{roleId}(roleId=${role.roleId})}" class="link-danger">Delete</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
<div class="container mt-5">
    <a th:href="@{/backToHome}" class="link-success fs-4">Back To Home</a>
</div>
</body>
</html>
